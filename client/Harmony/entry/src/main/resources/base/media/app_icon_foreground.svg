<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <g transform="translate(20, 24)">
    <!-- Monitor frame - pure white, bold stroke -->
    <rect x="0" y="0" width="104" height="68" rx="8" ry="8" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="4.5" />

    <!-- Screen area -->
    <rect x="5" y="5" width="94" height="58" rx="5" ry="5" fill="#ffffff" fill-opacity="0.06" />

    <!-- Remote connection: clean X pattern from center -->
    <line x1="28" y1="19" x2="76" y2="49" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
    <line x1="76" y1="19" x2="28" y2="49" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />

    <!-- Center hub - gold (tiger eye) -->
    <circle cx="52" cy="34" r="6" fill="url(#gold)" />

    <!-- Four corner nodes - white dots, well spaced -->
    <circle cx="28" cy="19" r="4" fill="#ffffff" />
    <circle cx="76" cy="19" r="4" fill="#ffffff" />
    <circle cx="28" cy="49" r="4" fill="#ffffff" />
    <circle cx="76" cy="49" r="4" fill="#ffffff" />

    <!-- Monitor stand -->
    <line x1="52" y1="68" x2="52" y2="80" stroke="#ffffff" stroke-opacity="0.35" stroke-width="4.5" stroke-linecap="round" />
    <line x1="38" y1="80" x2="66" y2="80" stroke="#ffffff" stroke-opacity="0.35" stroke-width="4.5" stroke-linecap="round" />
  </g>
</svg>